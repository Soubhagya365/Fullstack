<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: blue;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background-color: rgb(241, 238, 238);
            margin-top: 60px;
            border-radius: 10px;
            height: auto;
            width: 600px;
            padding: 20px;
        }

        .form-group {
            margin: 10px;
            
        }

        .button{
            display: flex;
            justify-content : center;
            align-items: center;
            gap: 10px;
        }

        button {
            color: red;
            border: none;
        }

        button:hover{
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Student Registration Form</h1>
        </div>

        <form>
            <div class="form-group">
                <label for="name">Name : </label>
                <input type="text">
            </div>

            <div class="form-group">
                <label for="password">Password : </label>
                <input type="password">
            </div>

            <div class="form-group">
                <label for="email">Email : </label>
                <input type="email">
            </div>

            <div class="form-group">
                <label for="contact">Phn no. : </label>
                <input type="tel">
            </div>

            <div class="form-group">
                <label for="date">D.O.B : </label>
                <input type="date">
            </div>

            <div class="form-group">
                <label for="gender">Gender : </label>
                <input type="radio" name="x">Male
                <input type="radio" name="x">Female
                <input type="radio" name="x">Other
            </div>

            <div class="form-group">
                <label for="branch">Branch : </label>
                <select>
                    <option value="">Select Course</option>
                    <option value="">Btech.</option>
                    <option value="">MCA</option>
                    <option value="">BCA</option>
                </select>
            </div>

            <div class="form-group">
                <input type="checkbox"> I acknowledge the terms and Conditions.
            </div>

            <div class="form-group">
                <label for="">Comment : </label>
                <textarea name="" id="" rows="2" cols="10"></textarea>
            </div>

            <div class="button">
                <button onclick="alert('Submitted')" type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </div>
</body>
</html>
