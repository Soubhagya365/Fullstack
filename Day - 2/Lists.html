<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Unordered List</h1>
    <ul type = "square">
        <li>Dog</li>
        <li>Cat</li>
        <li>Cow</li>
        <li>Bull</li>
        <li>Tiger</li>
    </ul>
    <br>
    <h1>Ordered List</h1>
    <ol type="1">
        <li>Axe</li>
        <li>Hammer</li>
        <li>Katana</li>
        <li>Knife</li>
        <li>Pistol</li>
    </ol>
    <br>
    <h1>Description List</h1>
    <dl>
        <dt>Silu</dt>
        <dd>Silu is an Animal.</dd>
        <dt>Gunu</dt>
        <dd>Gunu is not an Animal.</dd>
    </dl>
</body>
</html>
